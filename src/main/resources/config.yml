# ==================================================
# SimpleCommandTimer Configuration / Konfigürasyonu
# ==================================================
# EN: This file controls scheduled command execution.
# TR: Bu dosya zamanlanmış komutların çalıştırılmasını yönetir.

# --------------------------------------------------
# plugin_name
# --------------------------------------------------
# EN: Prefix used in plugin messages (supports color codes with &).
# TR: Eklenti mesajlarında kullanılan ön ek (renk kodlarını & ile destekler).
plugin_name: '&7[SimpleCommandTimer] '

# --------------------------------------------------
# time-zone
# --------------------------------------------------
# EN: Time zone used for schedule calculations. Must be a valid Java ZoneId.
# EN: Example: UTC, Europe/Istanbul, America/New_York
# TR: Zamanlama hesaplamalarında kullanılacak saat dilimi. Geçerli bir Java ZoneId olmalı.
# TR: Örnek: UTC, Europe/Istanbul, America/New_York
time-zone: 'UTC'

# --------------------------------------------------
# discord-webhook
# --------------------------------------------------
# EN: Enable/disable Discord webhook embed sending for entries.
# TR: Girdiler için Discord webhook embed gönderimini açar/kapatır.
discord-webhook: false

# --------------------------------------------------
# webhook-url
# --------------------------------------------------
# EN: Discord webhook URL. Required only if discord-webhook is true.
# TR: Discord webhook adresi. Yalnızca discord-webhook true ise gereklidir.
webhook-url: ''

# --------------------------------------------------
# Update_Check
# --------------------------------------------------
# EN: Checks the latest public GitHub release asynchronously and notifies online
# EN: players with sctimer.admin. The repository format must be owner/name.
# TR: En son herkese açık GitHub sürümünü asenkron kontrol eder ve sctimer.admin
# TR: yetkili çevrim içi oyunculara bildirir. Depo biçimi owner/name olmalıdır.
Update_Check:
  enabled: true
  repository: 'siberanka/SimpleCommandTimer-remake'
  check-interval-hours: 6
  notify-on-join: true

# EN: Minimum delay between manual trigger commands for each player.
# TR: Her oyuncunun manuel tetikleme komutları arasındaki en düşük gecikme.
Command:
  trigger-cooldown-ms: 1000

# ==================================================
# Commands Section / Komutlar Bölümü
# ==================================================
# EN: Add all scheduled entries under "Commands".
# TR: Tüm zamanlanmış girdileri "Commands" altına ekleyin.
#
# EN: Entry format:
# TR: Girdi biçimi:
#
# Commands:
#   your_entry_id:
#     command:
#       - 'first command'
#       - 'second command'
#     schedule:
#       - 'DAILY; 12:00:00'
#       - 'FRIDAY; 18:30:00'
#     embed-message:
#       - 'Optional Discord embed line 1'
#       - 'Optional Discord embed line 2'
#     webhook-color: '#ffffff'
#
# EN: Notes for "command":
# EN: - Each list item is dispatched from console.
# EN: - Do not include leading slash (/).
# TR: "command" notları:
# TR: - Listedeki her satır konsoldan çalıştırılır.
# TR: - Başına / koymayın.
#
# EN: Notes for "schedule":
# EN: - Format is DAY; HH:mm:ss
# EN: - Supported day values:
# EN:   DAILY, MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY
# EN: - Spanish day aliases are also accepted (LUNES, MARTES, ...).
# TR: "schedule" notları:
# TR: - Format DAY; HH:mm:ss
# TR: - Desteklenen gün değerleri:
# TR:   DAILY, MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY
# TR: - İspanyolca gün takma adları da desteklenir (LUNES, MARTES, ...).
#
# EN: Notes for "embed-message":
# EN: - If discord-webhook=true and webhook-url is valid, these lines are sent as one embed description.
# EN: - Use [] to disable embed sending for that entry.
# TR: "embed-message" notları:
# TR: - discord-webhook=true ve webhook-url geçerliyse bu satırlar tek embed açıklaması olarak gönderilir.
# TR: - İlgili girdi için embed göndermeyi kapatmak istiyorsanız [] kullanın.
#
# EN: Notes for "webhook-color":
# EN: - Per-entry embed color in HEX format (#RRGGBB).
# EN: - Example: '#ffffff', '#00ff99', '#ff0000'
# EN: - If invalid/empty, Discord default color is used.
# TR: "webhook-color" notları:
# TR: - Girdi bazlı embed rengi HEX biçiminde olmalıdır (#RRGGBB).
# TR: - Örnek: '#ffffff', '#00ff99', '#ff0000'
# TR: - Geçersiz veya boş ise Discord'un varsayılan rengi kullanılır.
#
# EN: Manual trigger command:
# EN: - /sctimer trigger <entry_id>
# EN: - Runs the selected entry immediately.
# EN: - Does NOT mark the daily scheduler state, so routine time execution still runs normally.
# TR: Manuel tetikleme komutu:
# TR: - /sctimer trigger <entry_id>
# TR: - Seçilen girdiyi anında çalıştırır.
# TR: - Günlük zamanlayıcı durumunu işaretlemez; bu nedenle saati geldiğinde normal şekilde tekrar çalışır.

Commands:
  # EN: Runs every day at 23:59:59.
  # TR: Her gün 23:59:59'da çalışır.
  daily_restart_notice:
    command:
      - 'say Server restart in 1 minute.'
    schedule:
      - 'DAILY; 23:59:59'
    embed-message:
      - 'Daily restart notice executed at 23:59:59.'
    webhook-color: '#ffffff'

  # EN: Runs on Friday evening.
  # TR: Cuma akşamı çalışır.
  friday_reward:
    command:
      - 'say Weekly reward event started!'
      - 'give @a diamond 1'
    schedule:
      - 'FRIDAY; 20:30:00'
    embed-message: []
    webhook-color: '#ffffff'

  # EN: Example with multiple schedules in one entry.
  # EN: Same command block runs at both times below.
  # TR: Tek girdi içinde birden fazla zamanlama örneği.
  # TR: Aşağıdaki iki saatte aynı komut bloğu çalışır.
  two_times_daily:
    command:
      - 'say This task runs twice a day.'
    schedule:
      - 'DAILY; 12:00:00'
      - 'DAILY; 18:00:00'
    embed-message:
      - 'two_times_daily entry executed.'
    webhook-color: '#ffffff'

# --------------------------------------------------
# Placeholder_Format
# --------------------------------------------------
# EN: Suffixes for time values in PlaceholderAPI.
# TR: PlaceholderAPI'deki süre değerleri için son ekler.
Placeholder_Format:
  hours: 'h '
  minutes: 'm '
  seconds: 's'
  none: 'None'

# --------------------------------------------------
# Lang
# --------------------------------------------------
# EN: Messages used by plugin command responses.
# TR: Eklenti komut yanıtlarında kullanılan mesajlar.
Lang:
  Error_alert: '&cYou do not have permission.'
  Console_alert: '&cThis command cannot be used from console.'
  Config_reloaded: '&aConfiguration reloaded.'
  Entry_triggered: '&aTriggered entry: &f%entry%'
  Entry_not_found: '&cEntry not found: &f%entry%'
  Trigger_rate_limited: '&cPlease wait before triggering another entry.'
  Usage: '&eUsage: /sctimer reload | /sctimer trigger <entry_id>'
  Update_available: '&eA new version is available: &f%latest_version% &7(current: %current_version%) &b%release_url%'

# --------------------------------------------------
# Permission
# --------------------------------------------------
# EN: Permission node required for /sctimer commands.
# TR: /sctimer komutları için gerekli yetki düğümü.
Permission:
  scTimer_permission: 'sctimer.admin'

